name: zextream-application-ai

networks:
  appnet:
    driver: bridge

volumes:
  pgdata:

services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - appnet
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: 'no'
    command: pnpm exec prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: ${NODE_ENV}
      TRUST_PROXY: ${TRUST_PROXY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - appnet
    # Backend listens on :3000 in both the dev (`pnpm start:dev`) and prod (`node
    # dist/main.js`) targets, so this one healthcheck is valid for either — unlike
    # frontend's, whose internal port differs by target (see docker-compose.prod.yml).
    # Hits liveness (GET /api/health), not readiness (/api/health/ready, which also
    # pings Postgres) — a database blip shouldn't make an orchestrator restart a
    # perfectly healthy backend process.
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - appnet
