# Optional overlay demonstrating file-based secrets instead of plain
# environment variables — the backend resolves any `<KEY>_FILE` variable by
# reading that file's contents (see backend/src/config/env.validation.ts),
# a convention shared by Docker Compose secrets, Kubernetes Secrets mounted
# as files, and most external secret managers (a Vault agent template, an
# AWS Secrets Manager sidecar, etc. all ultimately render a secret to a file
# and point an env var at its path).
#
# Usage:
#   1. Create ./secrets/*.txt with real values (this directory is
#      gitignored — never commit real secrets).
#   2. docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#        -f docker-compose.secrets.yml up -d --build
#
# To use a real secret manager instead of local files, point the `file:`
# entries below at whatever your manager already writes to disk (e.g. a
# Vault agent template output path, a Kubernetes Secret volume mount, or an
# AWS Secrets Manager sidecar's output) rather than ./secrets/*.txt.
services:
  backend:
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      API_KEY_ENCRYPTION_KEY_FILE: /run/secrets/api_key_encryption_key
    secrets:
      - database_url
      - jwt_access_secret
      - jwt_refresh_secret
      - api_key_encryption_key

secrets:
  database_url:
    file: ./secrets/database_url.txt
  jwt_access_secret:
    file: ./secrets/jwt_access_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  api_key_encryption_key:
    file: ./secrets/api_key_encryption_key.txt
