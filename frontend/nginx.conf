server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers applied to every response, including the proxied /api/
    # and /ws/ locations below — neither of those defines its own add_header, and nginx
    # only stops inheriting a parent's add_header list once a child block sets any
    # add_header of its own (which location / does, for its extra CSP header — see
    # below, where these three are repeated for that reason).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # This app doesn't terminate TLS itself (no cert is provisioned anywhere in this
    # repo's docker-compose topology, which serves plain HTTP on :80). A real deploy
    # needs a TLS-terminating layer in front of the whole stack (load balancer,
    # Cloudflare, etc.) that sets X-Forwarded-Proto for requests it forwards onward. If
    # that header says "http" — meaning the original client request was plaintext, not
    # that TLS was terminated upstream — redirect to https. When there's no such proxy
    # in front (today's bare docker-compose default), the header is simply absent and
    # this never fires.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    location / {
        # This is the location with real CSP teeth — it's the one serving the SPA's
        # HTML/JS, including Monaco (loaded same-origin from /assets/monaco-vs, see
        # frontend/src/app/features/code-editor/monaco-loader.ts). worker-src needs
        # 'self' blob: data: because Monaco's loader spins up its web worker from a
        # data: URL wrapper that in turn importScripts() a same-origin blob/file.
        # style-src needs 'unsafe-inline' because Monaco injects a <style> tag with
        # computed token-highlighting CSS at runtime rather than using static
        # stylesheets — there's no practical nonce/hash to pin here since the content is
        # dynamic. connect-src allows ws:/wss: for the Socket.IO connection proxied at
        # /ws/ above (same-origin, but explicit since 'self' matching ws upgrades on the
        # same origin isn't obvious at a glance).
        #
        # Defining add_header here means this block no longer inherits the three set at
        # server level above, so they're repeated.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob: data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

        try_files $uri $uri/ /index.html;
    }
}
