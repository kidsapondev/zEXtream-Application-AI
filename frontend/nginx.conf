server {
    # 8080, not 80: the production image (nginxinc/nginx-unprivileged — see
    # frontend/Dockerfile) runs nginx entirely as a non-root user, which can't bind
    # ports below 1024. docker-compose.prod.yml maps host :80 -> container :8080.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers applied to every response, including the proxied /api/
    # and /ws/ locations below — neither of those defines its own add_header, and nginx
    # only stops inheriting a parent's add_header list once a child block sets any
    # add_header of its own (which location / does, for its extra CSP header — see
    # below, where these three are repeated for that reason).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # This app doesn't terminate TLS itself (no cert is provisioned anywhere in this
    # repo's docker-compose topology, which serves plain HTTP on :80). A real deploy
    # needs a TLS-terminating layer in front of the whole stack (load balancer,
    # Cloudflare, etc.) that sets X-Forwarded-Proto for requests it forwards onward. If
    # that header says "http" — meaning the original client request was plaintext, not
    # that TLS was terminated upstream — redirect to https. When there's no such proxy
    # in front (today's bare docker-compose default), the header is simply absent and
    # this never fires.
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Plain REST calls, not long-lived streams — nginx's own defaults (60s) are
        # already right for this, but pinned explicitly so the contrast with /ws/'s
        # 3600s below is a deliberate, visible choice rather than an accident of
        # whichever default happens to apply.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /ws/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Long-lived Socket.IO connection carrying token-by-token AI generation —
        # 3600s (1h) is generous but reasonable for a slow model on modest hardware.
        # proxy_send_timeout matters too: it's the timeout for nginx writing to the
        # upstream (backend), which on a WS connection includes relaying client frames
        # (chat:send, chat:stop) sent at arbitrary, possibly long, intervals during an
        # otherwise-idle connection — without it nginx falls back to its 60s default
        # and can drop an otherwise-healthy idle connection.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Angular's production build (`outputHashing: all`) names every root-level bundle
    # main-<hash>.js, chunk-<hash>.js, styles-<hash>.css, polyfills-<hash>.js — the
    # filename itself changes whenever the content does, so these are safe to cache
    # aggressively and immutably forever; a stale cached copy can never be served under
    # a new deploy's filename. Deliberately matched by this naming convention rather
    # than a blanket `\.(js|css)$` so it does *not* catch /assets/ (Monaco's files,
    # copied in unhashed) or favicon.ico, which do need to be revalidated on change.
    location ~* ^/(main|chunk|styles|polyfills|runtime)-[^/]+\.(js|css)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        # This is the location with real CSP teeth — it's the one serving the SPA's
        # HTML/JS, including Monaco (loaded same-origin from /assets/monaco-vs, see
        # frontend/src/app/features/code-editor/monaco-loader.ts). worker-src needs
        # 'self' blob: data: because Monaco's loader spins up its web worker from a
        # data: URL wrapper that in turn importScripts() a same-origin blob/file.
        # style-src needs 'unsafe-inline' because Monaco injects a <style> tag with
        # computed token-highlighting CSS at runtime rather than using static
        # stylesheets — there's no practical nonce/hash to pin here since the content is
        # dynamic. connect-src allows ws:/wss: for the Socket.IO connection proxied at
        # /ws/ above (same-origin, but explicit since 'self' matching ws upgrades on the
        # same origin isn't obvious at a glance).
        #
        # Defining add_header here means this block no longer inherits the three set at
        # server level above, so they're repeated.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob: data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
        # index.html references the current build's content-hashed bundle filenames —
        # it must never be cached by the browser, or a browser that cached an old
        # index.html keeps requesting old (possibly now-deleted) bundle URLs
        # indefinitely after a deploy, invisible to a normal refresh and only fixed by
        # a hard-refresh/cache-clear — confirmed as the likely cause of a user seeing a
        # just-deployed UI change not show up. `no-cache` (not `no-store`) still allows
        # a conditional GET/304 for efficiency, it just forces revalidation every time.
        add_header Cache-Control "no-cache" always;

        try_files $uri $uri/ /index.html;
    }
}
