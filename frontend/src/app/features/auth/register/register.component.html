<div class="auth-page">
  <ds-hairline-card class="auth-card">
    <h1 class="auth-card__title">Create your account</h1>
    <div class="auth-card__rule"></div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <label class="auth-form__field">
        <span>Name</span>
        <input type="text" formControlName="displayName" autocomplete="name" />
      </label>

      <label class="auth-form__field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label class="auth-form__field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>

      @if (errorMessage()) {
        <p class="auth-form__error">{{ errorMessage() }}</p>
      }

      <button type="submit" class="auth-form__submit" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="auth-card__switch">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </ds-hairline-card>
</div>
