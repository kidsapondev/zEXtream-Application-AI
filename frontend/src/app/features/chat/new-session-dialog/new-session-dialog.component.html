@if (open()) {
  <div class="new-session-dialog__backdrop" (click)="cancelled.emit()">
    <div
      #dialogEl
      class="new-session-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="new-session-dialog-title"
      tabindex="-1"
      (click)="$event.stopPropagation()"
      (keydown.escape)="cancelled.emit()"
    >
      <h2 id="new-session-dialog-title" class="new-session-dialog__title">
        {{ editing() ? 'Change chat provider' : 'Start a new chat' }}
      </h2>

      <div class="new-session-dialog__field">
        <span class="new-session-dialog__label">Provider</span>
        <ds-segmented-tabs
          [options]="providerOptions()"
          [selected]="selectedProvider()"
          (selectedChange)="onProviderChange($event)"
        />
      </div>

      @if (modelOptions().length > 0) {
        <div class="new-session-dialog__field">
          <span class="new-session-dialog__label">Model</span>
          <ds-segmented-tabs
            [options]="modelOptions()"
            [selected]="selectedModel()"
            (selectedChange)="selectedModel.set($event)"
          />
          @if (selectedProvider() === 'ollama') {
            <p class="new-session-dialog__hint">Models currently pulled on this server.</p>
          }
        </div>
      }

      <div class="new-session-dialog__actions">
        <button type="button" class="btn" (click)="cancelled.emit()">Cancel</button>
        <button
          type="button"
          class="btn btn--primary"
          [disabled]="!canCreate()"
          (click)="confirm()"
        >
          {{ editing() ? 'Save provider' : 'Start chat' }}
        </button>
      </div>
    </div>
  </div>
}
