name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Build backend
        run: pnpm --filter backend build

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Test backend
        run: pnpm --filter backend test --runInBand

      - name: Test frontend
        run: pnpm --filter frontend exec ng test --watch=false

      - name: Lint backend
        run: pnpm --filter backend exec eslint "{src,apps,libs,test}/**/*.ts"

  image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.image }} image
        run: docker build -f ${{ matrix.image }}/Dockerfile -t ${{ matrix.image }}:ci .

      # Reports vulnerabilities to the Actions log and GitHub's Security tab
      # (via the SARIF upload below) without failing the build — picking a
      # severity threshold that blocks a merge is a policy call for the
      # project owner, not something to bake in unasked. See
      # docs/deployment.md's "Error reporting" / secrets sections for the
      # same reasoning applied to other infra/vendor decisions.
      - name: Scan ${{ matrix.image }} image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
