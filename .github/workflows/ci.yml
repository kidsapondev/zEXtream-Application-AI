name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    # Matches backend/test/setup-e2e.ts's own default TEST_DATABASE_URL exactly (same
    # user/password/db/port as the local `zextream-e2e-test-postgres` container this repo's
    # docs tell contributors to run by hand) — zero env overrides needed for `test:e2e` below.
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: chatapp
          POSTGRES_PASSWORD: e2etestpassword
          POSTGRES_DB: chatapp
        ports:
          - 5455:5432
        options: >-
          --health-cmd "pg_isready -U chatapp -d chatapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Build backend
        run: pnpm --filter backend build

      - name: Build frontend
        run: pnpm --filter frontend build

      - name: Test backend (unit)
        run: pnpm --filter backend test --runInBand

      - name: Apply Prisma migrations (e2e test database)
        run: pnpm --filter backend exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://chatapp:e2etestpassword@localhost:5455/chatapp

      - name: Test backend (e2e — real Postgres, real HTTP/WebSocket)
        run: pnpm --filter backend test:e2e --runInBand

      - name: Test frontend
        run: pnpm --filter frontend exec ng test --watch=false

      - name: Lint backend
        run: pnpm --filter backend exec eslint "{src,apps,libs,test}/**/*.ts"

  browser-e2e:
    runs-on: ubuntu-latest
    # Separate job (own Postgres, own browser install) rather than a step in
    # build-test-lint above: this suite drives real `ng serve` + `nest start` dev servers
    # (see e2e/playwright.config.ts's webServer entries) and a real Chromium instance, which
    # is a meaningfully different — and slower — footprint than the Jest-based suites above.
    # Keeping it isolated means a flake here doesn't block the fast unit/e2e/lint feedback.
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: chatapp
          POSTGRES_PASSWORD: e2etestpassword
          POSTGRES_DB: chatapp
        ports:
          - 5455:5432
        options: >-
          --health-cmd "pg_isready -U chatapp -d chatapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Apply Prisma migrations (e2e test database)
        run: pnpm --filter backend exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://chatapp:e2etestpassword@localhost:5455/chatapp

      - name: Install Playwright's Chromium (with OS deps)
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run browser e2e suite
        run: pnpm --filter e2e test:e2e:browser
        env:
          TEST_DATABASE_URL: postgresql://chatapp:e2etestpassword@localhost:5455/chatapp

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  image-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.image }} image
        run: docker build -f ${{ matrix.image }}/Dockerfile -t ${{ matrix.image }}:ci .

      # Reports vulnerabilities to the Actions log and GitHub's Security tab
      # (via the SARIF upload below) without failing the build — picking a
      # severity threshold that blocks a merge is a policy call for the
      # project owner, not something to bake in unasked. See
      # docs/deployment.md's "Error reporting" / secrets sections for the
      # same reasoning applied to other infra/vendor decisions.
      - name: Scan ${{ matrix.image }} image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
