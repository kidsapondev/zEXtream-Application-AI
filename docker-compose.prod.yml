# Resource limits below are starting points for a small-to-medium deployment, not
# measured production requirements — nothing here was load-tested. Tune `limits` (the
# hard cap; the container is throttled/OOM-killed past it) and `reservations` (what
# Docker guarantees is available, used for scheduling) once you have real traffic/memory
# data from `docker stats` or equivalent. `deploy.resources` requires Swarm to enforce
# `reservations`; under plain `docker compose up` (no Swarm), `limits` still apply via
# the container runtime but `reservations` are accepted and otherwise ignored.
services:
  migrate:
    build:
      target: prod

  postgres:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  backend:
    build:
      target: prod
    # Compose `environment:` always wins over an image's baked-in `ENV`, so pinning
    # NODE_ENV=production in backend/Dockerfile's prod stage alone isn't enough while
    # docker-compose.yml passes NODE_ENV: ${NODE_ENV} through unconditionally — if the
    # deployer's .env still has the base file's own default (NODE_ENV=development), the
    # prod-stage image crash-loops on boot (logger.config.ts only skips the pino-pretty
    # transport when NODE_ENV is exactly "production", and that devDependency isn't in
    # this stage's pruned node_modules). Pin it here so this overlay is self-contained
    # and doesn't depend on the deployer's .env agreeing with it.
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  frontend:
    build:
      target: prod
    # Production nginx image (nginxinc/nginx-unprivileged) listens on 8080, not 80 —
    # it runs entirely as a non-root user, which can't bind privileged ports. See
    # frontend/Dockerfile and frontend/nginx.conf.
    ports:
      - '80:8080'
    # 127.0.0.1, not localhost: this image's /etc/hosts resolves "localhost" to ::1
    # first, but nginx only binds 0.0.0.0:8080 (IPv4), not [::]:8080 — wget then hits
    # connection refused on ::1 and never falls back to IPv4, so the container reports
    # unhealthy despite serving real traffic fine (confirmed while wiring up the
    # Cloudflare Tunnel overlay: external requests through frontend worked throughout).
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/ || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
